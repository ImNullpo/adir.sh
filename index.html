<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="icons/page-icon.jpg">
    <link rel="stylesheet" href="styles.css">
    <!-- Using a clean monospace font to match the aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="page-container">
        <!-- Header -->
        <header class="header">
            <h1 class="site-title">[ ADIR.SH ]</h1>
            <p class="site-subtitle">Welcome to my digital archive</p>
        </header>

        <!-- Main Content Box -->
        <main class="content-box">
            <div class="box-inner">
                <div class="text-content">
                    <h2 class="box-title">// WHO_AM_I?</h2>
                    <div class="bio">
                        <p>I am Adir.</p>
                        <p>Internet wanderer. Security Researcher.</p>
                        <p>Building dynamic systems in this static world.</p>
                    </div>

                    <div class="status-divider"></div>
                    <div class="status">STATUS: <span class="status-text">CONNECTED</span></div>
                </div>

                <div class="profile-container">
                    <img src="images/pfp.jpg" alt="Mascot Profile" class="profile-image">
                </div>
            </div>
            <div class="box-corner-accent"></div>
        </main>

        <!-- Notice -->
        <div class="notice">
            <span class="prompt">></span> <span id="notice-text">[ NOTICE ]: SITE IS CURRENTLY UNDER PRODUCTION</span>
        </div>
    </div>

    <!-- Footer Bar -->
    <footer class="footer-bar">
        <div class="footer-left">
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
